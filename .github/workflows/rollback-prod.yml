name: Rollback Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to rollback to (e.g. v1.2.3)"
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Load app secrets from Infisical (OIDC)
        uses: aretecp/github-actions/actions/load-infisical-secrets@v1
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_INTERNAL_PROJECT_SLUG }}
          environment: prod
          path: /m365-mcp

      - name: Load shared infra secrets from Infisical (OIDC)
        uses: aretecp/github-actions/actions/load-infisical-secrets@v1
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          project-slug: arete-shared
          environment: prod
          path: /
          recursive: true

      - name: Join Tailscale
        uses: aretecp/github-actions/actions/tailscale-connect@v1
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}

      - name: Rollback to ${{ inputs.version }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_TAILSCALE_IP }}
          username: ${{ vars.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            REPO_DIR="$HOME/ms-365-mcp-server"

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "ERROR: $REPO_DIR does not exist. Nothing to roll back."
              exit 1
            fi

            cd "$REPO_DIR"
            VERSION="${{ inputs.version }}"
            echo "Rolling back to $VERSION..."

            cat > .env <<'ENVEOF'
            MICROSOFT_CLIENT_ID=${{ env.MICROSOFT_CLIENT_ID }}
            MICROSOFT_CLIENT_SECRET=${{ env.MICROSOFT_CLIENT_SECRET }}
            MICROSOFT_TENANT_ID=${{ env.MICROSOFT_TENANT_ID }}
            MS365_MCP_SESSION_KEY=${{ env.MS365_MCP_SESSION_KEY }}
            MS365_MCP_POLICY_ADMINS=${{ env.MS365_MCP_POLICY_ADMINS }}
            PUBLIC_HOSTNAME=m365.mcp.areteintelligence.ai
            ENVIRONMENT=production
            VERSION=${{ inputs.version }}
            ENVEOF
            chmod 600 .env

            git fetch origin --tags
            git checkout --force --detach "$VERSION"

            docker compose --env-file .env -f docker-compose.prod.yml up -d --build

            curl -fsSL "https://raw.githubusercontent.com/aretecp/github-actions/v1/scripts/wait-for-healthy.sh" \
              | TIMEOUT_SECONDS=150 \
                COMPOSE_FILE=docker-compose.prod.yml \
                ENV_FILE=.env \
                LOG_TAIL=100 \
                bash -s -- m365_mcp
            echo "Rollback to $VERSION successful."
