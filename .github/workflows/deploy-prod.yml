name: Deploy Production

on:
  release:
    types: [published]
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to deploy (e.g. v1.2.3). Defaults to main."
        required: false
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      # Load shared infra secrets FIRST so per-project keys from /m365-mcp
      # (loaded next) can override any collisions with arete-shared subfolders
      # (e.g. arete-shared/terraform/entra/MICROSOFT_* would otherwise shadow
      # this app's own Entra client credentials).
      - name: Load shared infra secrets from Infisical (OIDC)
        uses: aretecp/github-actions/actions/load-infisical-secrets@v1
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_SHARED_PROJECT_SLUG }}
          environment: prod
          path: /
          recursive: true

      - name: Load app secrets from Infisical (OIDC)
        uses: aretecp/github-actions/actions/load-infisical-secrets@v1
        with:
          method: oidc
          identity-id: ${{ vars.INFISICAL_OIDC_IDENTITY_ID }}
          project-slug: ${{ vars.INFISICAL_INTERNAL_PROJECT_SLUG }}
          environment: prod
          path: /m365-mcp

      - name: Join Tailscale
        uses: aretecp/github-actions/actions/tailscale-connect@v1
        with:
          authkey: ${{ env.TAILSCALE_AUTHKEY }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.VPS_TAILSCALE_IP }}
          username: ${{ vars.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            REPO_DIR="$HOME/ms-365-mcp-server"

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "ERROR: $REPO_DIR does not exist. Prod deploy refuses to clone."
              echo "First-time bootstrap is manual — see docs/DEPLOYMENT.md §7.5."
              exit 1
            fi

            cd "$REPO_DIR"

            VERSION="${{ inputs.version || github.ref_name || 'main' }}"
            echo "Deploying version: $VERSION"

            cat > .env <<'ENVEOF'
            MICROSOFT_CLIENT_ID=${{ env.MICROSOFT_CLIENT_ID }}
            MICROSOFT_CLIENT_SECRET=${{ env.MICROSOFT_CLIENT_SECRET }}
            MICROSOFT_TENANT_ID=${{ env.MICROSOFT_TENANT_ID }}
            MS365_MCP_SESSION_KEY=${{ env.MS365_MCP_SESSION_KEY }}
            MS365_MCP_POLICY_ADMINS=${{ env.MS365_MCP_POLICY_ADMINS }}
            PUBLIC_HOSTNAME=m365.mcp.areteintelligence.ai
            ENVIRONMENT=production
            VERSION=${{ inputs.version || github.ref_name || 'main' }}
            ENVEOF
            chmod 600 .env

            git fetch origin --tags --prune --force
            # Accept bare semver (1.8.0) as well as tag form (v1.8.0).
            if ! git show-ref --verify --quiet "refs/tags/$VERSION" && git show-ref --verify --quiet "refs/tags/v$VERSION"; then
              VERSION="v$VERSION"
              echo "Normalized to tag: $VERSION"
            fi
            # Detach to the fetched ref so branch deploys (e.g. VERSION=main)
            # never use a stale local branch tip. Works for both tags and branches.
            if git show-ref --verify --quiet "refs/tags/$VERSION"; then
              git checkout --force --detach "refs/tags/$VERSION"
            elif git show-ref --verify --quiet "refs/remotes/origin/$VERSION"; then
              git checkout --force --detach "origin/$VERSION"
            else
              echo "ERROR: '$VERSION' is neither a tag nor a remote branch. Aborting." >&2
              exit 1
            fi
            echo "Checked out: $(git rev-parse --short HEAD) ($(git log -1 --format=%s))"

            docker compose --env-file .env -f docker-compose.prod.yml up -d --build

            curl -fsSL "https://raw.githubusercontent.com/aretecp/github-actions/v1/scripts/wait-for-healthy.sh" \
              | TIMEOUT_SECONDS=150 \
                COMPOSE_FILE=docker-compose.prod.yml \
                ENV_FILE=.env \
                LOG_TAIL=100 \
                bash -s -- m365_mcp
            echo "Deployed $VERSION."
