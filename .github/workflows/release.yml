name: Release

# Thin shim. Logic lives in aretecp/github-actions/.github/workflows/release-shared.yml.
# Bump the @v1 ref there to pick up patch/minor fixes automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      major:
        description: "Force major version bump (e.g. 1.x.x → 2.0.0)"
        required: false
        type: boolean
        default: false

# Permissions required by release-shared.yml; reusable workflows can only
# use what the caller has granted.
permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

jobs:
  release:
    uses: aretecp/github-actions/.github/workflows/release-shared.yml@v1
    with:
      major: ${{ inputs.major || false }}
    secrets: inherit
