# Production Docker Compose for the M365 MCP Server.
#
# Mirrors the pattern in arilearn-phx / areteos / contact-intelligence:
#   - No host port publishing — Traefik on the VPS routes via the shared
#     `aichat_openwebui-network` docker network.
#   - TLS terminated by Traefik with the `letsencrypt` certresolver.
#   - Secrets arrive via a `.env` file written by GitHub Actions on the VPS,
#     then `docker compose --env-file .env -f docker-compose.prod.yml up -d`.
#     The `${X:?Set X}` interpolation belt-and-suspenders the .env presence.
#
# Manual invocation (rare, for first-time bootstrap):
#   infisical run --env prod --path /m365-mcp -- docker compose -f docker-compose.prod.yml up -d --build
#
# See docs/DEPLOYMENT.md §7 for the full setup.

services:
  m365-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: ghcr.io/aretecp/m365-mcp-server:${IMAGE_TAG:-latest}
    container_name: m365_mcp
    restart: unless-stopped

    # No published ports — Traefik discovers the service over the shared network.
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.m365-mcp.rule=Host(`${PUBLIC_HOSTNAME:-m365.mcp.areteintelligence.ai}`)'
      - 'traefik.http.routers.m365-mcp.entrypoints=websecure'
      - 'traefik.http.routers.m365-mcp.tls=true'
      - 'traefik.http.routers.m365-mcp.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.m365-mcp.middlewares=security-headers@file,rate-limit@file'
      - 'traefik.http.services.m365-mcp.loadbalancer.server.port=3000'
      - 'traefik.docker.network=aichat_openwebui-network'

    networks:
      - default
      - aichat_openwebui-network

    environment:
      # Wired from the .env file written by the deploy workflow.
      MS365_MCP_CLIENT_ID: '${MICROSOFT_CLIENT_ID:?MICROSOFT_CLIENT_ID is required}'
      MS365_MCP_CLIENT_SECRET: '${MICROSOFT_CLIENT_SECRET:?MICROSOFT_CLIENT_SECRET is required}'
      MS365_MCP_TENANT_ID: '${MICROSOFT_TENANT_ID:?MICROSOFT_TENANT_ID is required}'
      MS365_MCP_SESSION_KEY: '${MS365_MCP_SESSION_KEY:?MS365_MCP_SESSION_KEY is required}'
      MS365_MCP_POLICY_ADMINS: '${MS365_MCP_POLICY_ADMINS:?MS365_MCP_POLICY_ADMINS is required}'

      # Public URL — fixed for the prod deploy. The OAuth broker advertises this
      # as the issuer and builds its single Microsoft callback from it:
      #   https://m365.mcp.areteintelligence.ai/auth/callback
      # That ONE redirect URI is all the Entra app needs registered, no matter
      # how many MCP clients connect (they obtain their own client_id via DCR).
      MS365_MCP_PUBLIC_URL: 'https://${PUBLIC_HOSTNAME:-m365.mcp.areteintelligence.ai}'
      # CORS is permissive by default (bearer-auth, no cookies) so any MCP client
      # can connect — leave MS365_MCP_CORS_ORIGIN unset. Set it to pin a single
      # origin only for a hardened single-client deployment.
      # MS365_MCP_CORS_ORIGIN: "https://claude.ai"
      # Legacy redirect allowlist: now only a fallback for clients that DON'T do
      # Dynamic Client Registration (Claude.ai today). DCR clients are validated
      # against their own registered redirect_uris, so new clients need no entry
      # here. Keep Claude.ai listed until it migrates to DCR.
      MS365_MCP_ALLOWED_REDIRECT_URIS: 'https://claude.ai/api/mcp/auth_callback'

      # Release metadata (visible in /admin and logs).
      ENVIRONMENT: ${ENVIRONMENT:-production}
      VERSION: ${VERSION:-}

      # Tool surface: which domain toolsets register. Unset = core-only (~12
      # tools). 'all' exposes the full hand-written surface (~44 tools: mail,
      # calendar, files, directory, teams, sharepoint). Pure surface control —
      # Entra scopes already cover every tool, so this needs no re-consent.
      MS365_MCP_TOOLSETS: 'all'

      # Output + runtime tuning.
      MS365_MCP_OUTPUT_FORMAT: 'toon'
      NODE_ENV: 'production'

    volumes:
      - m365_mcp_data:/data
      - m365_mcp_policy:/policy

    healthcheck:
      test:
        - 'CMD'
        - 'node'
        - '-e'
        - "require('http').get('http://127.0.0.1:3000/.well-known/oauth-authorization-server', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  m365_mcp_data:
  m365_mcp_policy:

networks:
  aichat_openwebui-network:
    external: true
